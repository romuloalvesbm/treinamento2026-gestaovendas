name: CI-CD

on:
  push:
    branches: [ "main" ]

jobs:
  
   # Job de TESTE (fictício por enquanto)
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Simular testes
        run: |
          echo "Rodando testes..."
          sleep 3
          echo "Testes passaram com sucesso!"

  # Build e Push da imagem
  build-and-push:
    runs-on: ubuntu-latest
    needs: test  # só executa se o teste passar

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build da imagem
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/gestaovendas_api:latest -f GestaoVendas.API/Dockerfile .

      - name: Push da imagem
        run: docker push ${{ secrets.DOCKER_USERNAME }}/gestaovendas_api:latest